name: Supabase Keep-Alive
on:
  schedule:
    # Esegue il ping ogni lunedì e giovedì alle 00:00
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Permette di avviarlo anche a mano

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API (Node.js)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node -e "
          async function run() {
            // Aggressive sanitization: keep only base64url characters + dot (JWT standard)
            // Even if the key has standard base64 (+, /, =), those are valid in headers, 
            // but Supabase keys are usually base64url. 
            // Here we allow Alphanumeric, dots, dashes, underscores.
            const sanitize = (s) => (s || '').replace(/[^a-zA-Z0-9\.\-_]/g, '').trim();
            const cleanUrl = (s) => (s || '').trim().replace(/\/+$/, '');
            
            const key = sanitize(process.env.SUPABASE_ANON_KEY);
            const url = cleanUrl(process.env.SUPABASE_URL) + '/rest/v1/materie?select=id&limit=1';
            
            console.log('Target URL starts with:', url.substring(0, 30));
            console.log('Analyzed Key length:', key.length);
            
            if (key.length < 50) {
              console.error('::error::La SUPABASE_ANON_KEY sembra essere troppo corta o non valida dopo la pulizia!');
              process.exit(1);
            }

            try {
              console.log('Sending request...');
              const res = await fetch(url, {
                headers: {
                  'apikey': key,
                  'Authorization': 'Bearer ' + key
                }
              });
              
              console.log('Response Status:', res.status, res.statusText);
              
              if (res.ok) {
                console.log('Success! Database is awake.');
                process.exit(0);
              } else {
                console.error('Ping failed with status:', res.status);
                process.exit(1);
              }
            } catch (e) {
              console.error('Network or Fetch Error:', e.message);
              process.exit(1);
            }
          }
          run();
          "
