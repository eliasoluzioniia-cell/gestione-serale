name: Supabase Keep-Alive
on:
  schedule:
    # Esegue il ping ogni lunedì e giovedì alle 00:00
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Permette di avviarlo anche a mano

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Pulisce la URL da eventuali spazi o slash finali
          URL=$(echo "$SUPABASE_URL" | xargs | sed 's/\/$//')
          
          if [ -z "$URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL o SUPABASE_ANON_KEY non configurati correttamente!"
            exit 1
          fi

          echo "Ping in corso a: $URL"

          # Esegue il ping su una singola riga senza backslash
          # Usiamo -f per far fallire il job in caso di errore HTTP (es. 401, 404)
          # Usiamo -i per vedere gli header nella console (utile per debug)
          curl -f -i "${URL}/rest/v1/materie?select=id&limit=1" -H "apikey: ${SUPABASE_ANON_KEY}" -H "Authorization: Bearer ${SUPABASE_ANON_KEY}"
