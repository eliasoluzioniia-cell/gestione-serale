name: Supabase Keep-Alive
on:
  schedule:
    # Esegue il ping ogni lunedì e giovedì alle 00:00
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Permette di avviarlo anche a mano

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API (Node.js)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node -e "
          const https = require('https');
          
          if (!process.env.SUPABASE_URL || !process.env.SUPABASE_ANON_KEY) {
            console.error('::error::SUPABASE_URL o SUPABASE_ANON_KEY non configurati correttamente!');
            process.exit(1);
          }

          // Puliamo i segreti da eventuali spazi o ritorni a capo accidentali
          const url = process.env.SUPABASE_URL.trim().replace(/\/$/, '') + '/rest/v1/materie?select=id&limit=1';
          const key = process.env.SUPABASE_ANON_KEY.trim();

          const options = {
            headers: {
              'apikey': key,
              'Authorization': 'Bearer ' + key
            }
          };

          console.log('Sending ping to Supabase...');
          
          https.get(url, options, (res) => {
            console.log('HTTP Status Code:', res.statusCode);
            if (res.statusCode >= 200 && res.statusCode < 400) {
              console.log('Success! Database is awake.');
              process.exit(0);
            } else {
              console.error('Failure! Received error status:', res.statusCode);
              process.exit(1);
            }
          }).on('error', (e) => {
            console.error('Network Error:', e.message);
            process.exit(1);
          });
          "
