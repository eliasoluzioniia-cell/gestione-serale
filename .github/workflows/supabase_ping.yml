name: Supabase Keep-Alive
on:
  schedule:
    # Esegue il ping ogni lunedì e giovedì alle 00:00
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Permette di avviarlo anche a mano

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Verifica se le variabili sono vuote
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL o SUPABASE_ANON_KEY non sono configurati nei Secrets del repository!"
            exit 1
          fi

          # Rimuove eventuale slash finale dalla URL per evitare //rest/v1
          URL="${SUPABASE_URL%/}"
          
          echo "Tentativo di ping a: $URL/rest/v1/materie"
          
          # Esegue il ping e fallisce (-f) se il server risponde con errore
          # Nota: lasciamo il backslash qui perché siamo dentro un blocco YAML 'run: |'
          curl -f -i -X GET "$URL/rest/v1/materie?select=id&limit=1" \
          -H "apikey: $SUPABASE_ANON_KEY" \
          -H "Authorization: Bearer $SUPABASE_ANON_KEY"
