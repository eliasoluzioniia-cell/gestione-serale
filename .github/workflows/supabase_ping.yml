name: Supabase Keep-Alive
on:
  schedule:
    # Esegue il ping ogni lunedì e giovedì alle 00:00
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Permette di avviarlo anche a mano
  push:
    branches: [main] # Permette l'avvio automatico al push per debug

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API (Node.js)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node -e "
          async function run() {
            const sanitize = (s) => (s || '').replace(/[\x00-\x1F\x7F-\xFF]/g, '').trim();
            const cleanUrl = (s) => (s || '').trim().replace(/\/+$/, '');
            
            const key = sanitize(process.env.SUPABASE_ANON_KEY);
            const baseUrl = cleanUrl(process.env.SUPABASE_URL);
            
            // Pinging the root of the REST API is the most reliable way to wake up the DB
            // without worrying about RLS policies or missing tables.
            const url = baseUrl + '/rest/v1/';
            
            console.log('Target URL prefix:', baseUrl.substring(0, 30) + '...');
            console.log('Key length:', key.length);
            // Safe debug: show only first 4 chars to verify key presence/correctness
            if (key.length > 4) {
              console.log('Key prefix check:', key.substring(0, 4) + '...');
            }
            
            if (key.length < 10) {
              console.error('::error::La chiave API è vuota o troppo corta!');
              process.exit(1);
            }

            try {
              console.log('Sending Keep-Alive ping to REST root...');
              const res = await fetch(url, {
                headers: {
                  'apikey': key,
                  'Authorization': 'Bearer ' + key
                }
              });
              
              console.log('Response Status:', res.status, res.statusText);
              
              if (res.ok) {
                console.log('Success! Supabase is awake.');
                process.exit(0);
              } else {
                console.error('Ping failed with status:', res.status);
                // 401: Key issue, 404: URL issue
                process.exit(1);
              }
            } catch (e) {
              console.error('Network or Fetch Error:', e.message);
              process.exit(1);
            }
          }
          run();
          "
