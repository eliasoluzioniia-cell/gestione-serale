name: Supabase Keep-Alive
on:
  schedule:
    # Esegue il ping ogni lunedì e giovedì alle 00:00
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Permette di avviarlo anche a mano

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API (Node.js)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node -e "
          async function run() {
            // Remove only control characters (0-31) and non-ASCII (127-255).
            // This preserves valid Base64 characters like +, / and =.
            const sanitize = (s) => (s || '').replace(/[\x00-\x1F\x7F-\xFF]/g, '').trim();
            const cleanUrl = (s) => (s || '').trim().replace(/\/+$/, '');
            
            const key = sanitize(process.env.SUPABASE_ANON_KEY);
            const url = cleanUrl(process.env.SUPABASE_URL) + '/rest/v1/materie?select=id&limit=1';
            
            console.log('Target URL starts with:', url.substring(0, 30));
            console.log('Analyzed Key length:', key.length);
            
            if (key.length < 10) {
              console.error('::error::La chiave API è vuota o troppo corta dopo la pulizia!');
              process.exit(1);
            }

            try {
              console.log('Sending request...');
              const res = await fetch(url, {
                headers: {
                  'apikey': key,
                  'Authorization': 'Bearer ' + key
                }
              });
              
              console.log('Response Status:', res.status, res.statusText);
              
              if (res.ok) {
                console.log('Success! Database is awake.');
                process.exit(0);
              } else {
                console.error('Ping failed with status:', res.status);
                // If 404, suggest checking table name. If 401, suggest checking Key.
                if (res.status === 404) console.log('Tip: Check if table \"materie\" exists in your Supabase REST API.');
                if (res.status === 401) console.log('Tip: This usually means the ANON_KEY is incorrect or expired.');
                process.exit(1);
              }
            } catch (e) {
              console.error('Network or Fetch Error:', e.message);
              process.exit(1);
            }
          }
          run();
          "
