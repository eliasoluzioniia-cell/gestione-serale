name: Supabase Keep-Alive
on:
  schedule:
    # Esegue il ping ogni lunedì e giovedì alle 00:00
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Permette di avviarlo anche a mano
  push:
    branches: [main] # Permette l'avvio automatico al push per debug

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API (Node.js)
        env:
          # We try both possible naming conventions to be safe
          URL_1: ${{ secrets.SUPABASE_URL }}
          URL_2: ${{ secrets.VITE_SUPABASE_URL }}
          KEY_1: ${{ secrets.SUPABASE_ANON_KEY }}
          KEY_2: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          node -e "
          async function run() {
            const rawUrl = (process.env.URL_1 || process.env.URL_2 || '').trim();
            const rawKey = (process.env.KEY_1 || process.env.KEY_2 || '').trim();

            console.log('--- Diagnostic Info ---');
            console.log('URL provided by secrets:', !!rawUrl);
            console.log('Key provided by secrets:', !!rawKey);

            if (!rawUrl || !rawKey) {
              console.error('::error::Nessun segreto trovato! Assicurati di aver creato i Secrets \"SUPABASE_URL\" e \"SUPABASE_ANON_KEY\" nelle impostazioni di GitHub.');
              process.exit(1);
            }

            const sanitize = (s) => s.replace(/[\x00-\x1F\x7F-\xFF]/g, '').trim();
            const url = rawUrl.replace(/\/+$/, '') + '/rest/v1/';
            const key = sanitize(rawKey);

            console.log('Target URL prefix:', url.substring(0, 30) + '...');
            console.log('Key length:', key.length);
            if (key.length > 4) console.log('Key prefix check:', key.substring(0, 4) + '...');

            try {
              console.log('Sending Keep-Alive ping...');
              const res = await fetch(url, {
                headers: { 'apikey': key, 'Authorization': 'Bearer ' + key }
              });
              
              console.log('Response Status:', res.status, res.statusText);
              
              if (res.ok) {
                console.log('Success! Supabase is awake.');
                process.exit(0);
              } else {
                console.error('Ping failed with status:', res.status);
                process.exit(1);
              }
            } catch (e) {
              console.error('Network or Fetch Error:', e.message);
              process.exit(1);
            }
          }
          run();
          "
