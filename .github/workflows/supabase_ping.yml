name: Supabase Keep-Alive
on:
  schedule:
    # Esegue il ping ogni lunedì e giovedì alle 00:00
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Permette di avviarlo anche a mano

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "Errore: SUPABASE_URL o SUPABASE_ANON_KEY non configurati nei Secrets di GitHub."
            exit 1
          fi
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/materie?select=id&limit=1" -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
